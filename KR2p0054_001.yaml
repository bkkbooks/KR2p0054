body:
  text: 顏淵侍於夫子夫子曰回獨智人所惡也獨貴人所惡也獨富人所惡也貴而能讓斯人欲其貴也富而斯人欲其富也顏淵侍於夫子夫子曰回君子為禮以依於仁顏淵作而答曰回不敏弗能少居也夫子曰坐吾語汝言之而不義口勿言也視之而不義目勿視也聽之而不義耳勿聽也動而不義身毋動焉顏淵退數日不出問之曰吾子何其瘠也曰然吾親聞言於夫子欲行之不能欲去之而不可吾是以瘠也行子人子羽問於子貢曰仲尼與吾子産孰賢子貢曰夫子治十室之邑亦樂治萬室之邦亦樂然則賢於子産壴喜矣與禹孰賢子貢曰禹治天下之川以為己名夫子治詩書亦以己名然則賢於禹也與舜孰賢子貢曰舜君天下夫子然則賢於舜也凡目毋遊定見是求毋欽毋去聲之疾徐稱其衆寡頸而秀肩毋廢毋聳身毋偃毋靜
